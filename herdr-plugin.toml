id = "arjenblokzijl.herdr-launcher"
name = "Launcher"
version = "0.1.0"
min_herdr_version = "0.7.0"
description = "A workflow launcher: pick a workflow, fill its fields, and it runs a command — in herdr (menu picker) and as a CLI (herdr-launcher run <name>). Workflows are config-as-code .mjs. Zero runtime deps; needs Node >= 18."
platforms = ["macos", "linux"]

# Open the launcher picker (an interactive overlay pane). Bind a key or run from
# the action menu.
[[actions]]
id = "pick"
title = "Launcher: pick & run"
command = ["./bin/herdr-launcher.mjs", "open"]

# The interactive picker, as a herdr-managed overlay pane.
[[panes]]
id = "launcher-ui"
title = "Launcher"
placement = "overlay"
command = ["./bin/herdr-launcher.mjs", "pick"]
