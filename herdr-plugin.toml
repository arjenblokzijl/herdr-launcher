id = "arjenblokzijl.forms"
name = "Forms"
version = "0.1.0"
min_herdr_version = "0.7.0"
description = "Multi-field input forms that run a command. A menu picker inside herdr and a CLI (forms run <name>). Each form is a config-as-code .mjs (fields + run). Zero runtime deps; needs Node >= 18."
platforms = ["macos", "linux"]

# Open the form picker (an interactive overlay pane). Bind a key or run from the
# action menu.
[[actions]]
id = "forms"
title = "Forms: pick & run"
command = ["./bin/forms.mjs", "open"]

# The interactive picker, as a herdr-managed overlay pane.
[[panes]]
id = "forms-ui"
title = "Forms"
placement = "overlay"
command = ["./bin/forms.mjs", "pick"]
