id = "arjenblokzijl.herdr-launcher"
name = "Launcher"
version = "0.2.0"
min_herdr_version = "0.7.0"
description = "A workflow launcher with a ratatui TUI picker + field form (fuzzy select, multi-line). Declarative TOML workflows, single static Rust binary."
platforms = ["macos", "linux"]

# Compile ./bin/herdr-launcher on install (cargo, or mise's rust).
[[build]]
command = ["sh", "build.sh"]

# Open the picker as a right-split pane. Wrapped in `sh -c` so $HERDR_PLUGIN_ROOT
# (set by herdr for plugin processes) expands at runtime — resolving the binary
# regardless of the pane's cwd.
[[actions]]
id = "pick"
title = "Launcher: pick & run"
command = ["sh", "-c", "exec \"$HERDR_PLUGIN_ROOT/bin/herdr-launcher\" open"]

# The ratatui picker + field form, as a right split pane (--direction right is set
# by the open call). Pane title shows as "Launcher".
[[panes]]
id = "launcher-ui"
title = "Launcher"
placement = "split"
command = ["sh", "-c", "exec \"$HERDR_PLUGIN_ROOT/bin/herdr-launcher\" pick"]
